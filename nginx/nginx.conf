events {}

http {
    server {
        listen 80;
        return 301 https://localhost$request_uri;
    }

    server {
        listen 443 ssl;

        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        location / {
            proxy_pass http://app:3000;
        }
    }
}
